services:
  caddy:
    image: caddy:2
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - ui
      - api
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - 5173:5173
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - 3001:3001
